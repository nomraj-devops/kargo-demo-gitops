apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kargo-demo-stage
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nomraj-devops/kargo-demo-gitops.git
    targetRevision: main
    path: stage
  destination:
    server: https://kubernetes.default.svc
    namespace: stage
  syncPolicy:
    automated: {}
