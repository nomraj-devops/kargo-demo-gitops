apiVersion: apps/v1
kind: Deployment
metadata:
  name: kargo-demo-stage
  namespace: stage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kargo-demo-stage
  template:
    metadata:
      labels:
        app: kargo-demo-stage
    spec:
      containers:
      - name: app
        image: nomrajdevops/kargo-demo:v1
        ports:
        - containerPort: 3000


---
apiVersion: v1
kind: Service
metadata:
  name: kargo-demo-stage
  namespace: stage
spec:
  selector:
    app: kargo-demo-stage
  ports:
  - port: 80
    targetPort: 3000
        
